<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NeoProxy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b0b0f;
      --surface: #12121a;
      --surface2: #1a1a26;
      --border: #1f1f2e;
      --border2: #2d2d42;
      --accent: #7c3aed;
      --accent-glow: rgba(124,58,237,0.25);
      --accent2: #06b6d4;
      --text: #f3f4f6;
      --muted: #6b7280;
      --muted2: #4b5563;
      --success: #10b981;
      --error: #f43f5e;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .container {
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    /* ===== HEADER ===== */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 32px 0 24px 0;
      border-bottom: 1px solid var(--border);
    }

    .logo-group {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      font-size: 20px;
    }

    .logo-text {
      font-family: 'Syne', sans-serif;
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .header-badge {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 4px 12px;
      border-radius: 6px;
    }

    /* ===== MAIN AREA ===== */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 60px 0;
    }

    .hero {
      margin-bottom: 40px;
    }

    .hero-title {
      font-family: 'Syne', sans-serif;
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: -1px;
      margin-bottom: 8px;
    }

    .hero-title .line2 {
      color: var(--accent2);
    }

    .hero-sub {
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      color: var(--muted);
    }

    /* ===== SEARCH PANEL ===== */
    .search-panel {
      width: 100%;
      margin-bottom: 32px;
    }

    .search-wrapper {
      display: flex;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 10px;
      overflow: hidden;
      transition: all 0.2s;
    }

    .search-wrapper:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .search-protocol {
      display: flex;
      align-items: center;
      padding: 0 16px;
      background: var(--surface2);
      border-right: 1px solid var(--border2);
      font-family: 'Space Mono', monospace;
      font-size: 0.85rem;
      color: var(--muted);
      user-select: none;
    }

    #urlInput {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 0.95rem;
      padding: 16px;
      min-width: 0;
    }

    #urlInput::placeholder { color: var(--muted2); }

    #goBtn {
      background: var(--accent);
      border: none;
      color: white;
      padding: 0 24px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    #goBtn:hover {
      background: #6d28d9;
    }

    /* Status bar */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
      height: 20px;
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--border2);
    }

    .status-text { color: var(--muted); }

    .status-bar.loading .status-dot { background: var(--accent2); animation: pulse 1s infinite; }
    .status-bar.loading .status-text { color: var(--accent2); }
    .status-bar.ok .status-dot { background: var(--success); }
    .status-bar.ok .status-text { color: var(--success); }
    .status-bar.err .status-dot { background: var(--error); }
    .status-bar.err .status-text { color: var(--error); }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* ===== SHORTCUTS ===== */
    .shortcuts-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 12px;
    }

    .shortcuts {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .shortcut {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 14px;
      font-size: 0.85rem;
      color: var(--text);
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .shortcut:hover {
      border-color: var(--muted2);
      background: var(--surface2);
    }

    .shortcut-icon { font-size: 14px; }

    /* ===== PROXY FRAME ===== */
    .frame-wrapper {
      display: none;
      width: 100%;
      margin-top: 40px;
      flex-direction: column;
    }

    .frame-toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-bottom: none;
      border-radius: 8px 8px 0 0;
      padding: 12px 16px;
    }

    .frame-dots {
      display: flex;
      gap: 6px;
    }

    .frame-dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      cursor: pointer;
    }

    .frame-dot.close { background: #ff5f57; }
    .frame-dot.min { background: #ffbd2e; }
    .frame-dot.max { background: #28c840; }

    .frame-url-display {
      flex: 1;
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 4px 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #proxyFrame {
      width: 100%;
      height: 70vh;
      border: 1px solid var(--border2);
      border-radius: 0 0 8px 8px;
      background: white;
    }

    /* ===== FOOTER ===== */
    footer {
      padding: 32px 0;
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted2);
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo-group">
      <div class="logo-icon">🌐</div>
      <div class="logo-text">NeoProxy</div>
    </div>
    <div class="header-badge">SW · URL-REWRITE · v1.0</div>
  </header>

  <main>
    <div class="hero">
      <div class="hero-title">
        <span class="line1">Browse</span>
        <span class="line2">Unrestricted</span>
      </div>
      <div class="hero-sub">ULTRAVIOLET-CLASS · URL REWRITING ENGINE</div>
    </div>

    <div class="search-panel">
      <div class="search-wrapper">
        <div class="search-protocol">https://</div>
        <input id="urlInput" type="text" placeholder="example.com を入力..." autocomplete="off" spellcheck="false">
        <button id="goBtn" onclick="navigate()">→ GO</button>
      </div>
      <div class="status-bar" id="statusBar">
        <div class="status-dot"></div>
        <span class="status-text" id="statusText">準備完了</span>
      </div>
    </div>

    <div class="shortcuts-label">Quick Access</div>
    <div class="shortcuts">
      <div class="shortcut" onclick="quick('https://www.google.com')">
        <span class="shortcut-icon">🔍</span> Google
      </div>
      <div class="shortcut" onclick="quick('https://www.wikipedia.org')">
        <span class="shortcut-icon">📖</span> Wikipedia
      </div>
      <div class="shortcut" onclick="quick('https://www.reddit.com')">
        <span class="shortcut-icon">💬</span> Reddit
      </div>
      <div class="shortcut" onclick="quick('https://news.ycombinator.com')">
        <span class="shortcut-icon">🗞️</span> Hacker News
      </div>
      <div class="shortcut" onclick="quick('https://github.com')">
        <span class="shortcut-icon">🐙</span> GitHub
      </div>
      <div class="shortcut" onclick="quick('https://www.youtube.com')">
        <span class="shortcut-icon">▶️</span> YouTube
      </div>
      <div class="shortcut" onclick="quick('https://developer.mozilla.org')">
        <span class="shortcut-icon">📘</span> MDN
      </div>
      <div class="shortcut" onclick="quick('https://www.duckduckgo.com')">
        <span class="shortcut-icon">🦆</span> DuckDuckGo
      </div>
    </div>

    <div class="frame-wrapper" id="frameWrapper">
      <div class="frame-toolbar">
        <div class="frame-dots">
          <div class="frame-dot close" onclick="closeFrame()"></div>
          <div class="frame-dot min"></div>
          <div class="frame-dot max"></div>
        </div>
        <div class="frame-url-display" id="frameURL">about:blank</div>
      </div>
      <iframe id="proxyFrame"
        sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals allow-top-navigation-by-user-activation"
        referrerpolicy="no-referrer"
      ></iframe>
    </div>
  </main>

  <footer>NEOPROXY · ULTRAVIOLET-CLASS ARCHITECTURE</footer>
</div>

<script>
  const PREFIX = '/neo/';

  // Encode URL to base64url
  function encode(url) {
    try {
      const encoded = encodeURIComponent(url);
      return btoa(encoded).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
    } catch(e) { return ''; }
  }

  function setStatus(state, text) {
    const bar = document.getElementById('statusBar');
    bar.className = 'status-bar ' + state;
    document.getElementById('statusText').textContent = text;
  }

  function navigate() {
    let url = document.getElementById('urlInput').value.trim();
    if (!url) return;
    if (!/^https?:\/\//.test(url)) url = 'https://' + url;

    const encoded = encode(url);
    if (!encoded) return setStatus('err', 'URLエンコードエラー');

    const proxied = PREFIX + encoded;
    const frame = document.getElementById('proxyFrame');
    const wrapper = document.getElementById('frameWrapper');
    const frameURL = document.getElementById('frameURL');

    wrapper.style.display = 'flex';
    frameURL.textContent = url;
    setStatus('loading', '接続中...');

    frame.onload = () => setStatus('ok', '読み込み完了 ✓');
    frame.onerror = () => setStatus('err', '読み込みエラー ✗');
    frame.src = proxied;

    // Scroll to frame
    setTimeout(() => wrapper.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
  }

  function quick(url) {
    document.getElementById('urlInput').value = url;
    navigate();
  }

  function closeFrame() {
    document.getElementById('frameWrapper').style.display = 'none';
    document.getElementById('proxyFrame').src = 'about:blank';
    setStatus('', '準備完了');
  }

  document.getElementById('urlInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') navigate();
  });

  // Register Service Worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/neo/sw.js', { scope: '/neo/' })
      .then(reg => {
        console.log('[NeoProxy] Service Worker registered:', reg.scope);
      })
      .catch(err => {
        console.warn('[NeoProxy] Service Worker registration failed:', err);
      });
  }
</script>
</body>
</html>
